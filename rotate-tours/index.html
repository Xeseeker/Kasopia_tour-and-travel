<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0f172a" />
    <meta
      name="description"
      content="Kasopia Tour & Travel creates cultural, adventure, and tailor-made Ethiopia journeys across Lalibela, Simien, Danakil, Axum, and beyond."
    />
    <link rel="canonical" href="https://kasopiatour.com/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/logo.png" />
    <title>Kasopia Tour & Travel | Explore Ethiopia</title>
  </head>
  <body class="bg-[#f9f9f6]">
    <div id="root"></div>
    <div id="google_translate_element" class="hidden"></div>
    <script>
      function restoreLanguage() {
        const savedLang = localStorage.getItem('googleTranslateLanguage');
        if (savedLang && savedLang !== 'en') {
          setTimeout(() => {
            const combo = document.querySelector('select.goog-te-combo');
            if (combo && combo.value !== savedLang) {
              combo.value = savedLang;
              combo.dispatchEvent(new Event('change'));
            }
          }, 500);
        }
      }

      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: 'en',
            includedLanguages: 'am,ar,en,fr,de,iw,it,es',
            layout: google.translate.TranslateElement.InlineLayout.HORIZONTAL,
          },
          'google_translate_element'
        );

        setTimeout(restoreLanguage, 1000);

        setTimeout(() => {
          const combo = document.querySelector('select.goog-te-combo');
          if (combo) {
            combo.addEventListener('change', function () {
              if (this.value && this.value !== 'en') {
                localStorage.setItem('googleTranslateLanguage', this.value);
              } else {
                localStorage.removeItem('googleTranslateLanguage');
              }
            });

            setInterval(() => {
              const savedLang = localStorage.getItem('googleTranslateLanguage');
              if (savedLang && savedLang !== 'en' && combo.value !== savedLang) {
                combo.value = savedLang;
                combo.dispatchEvent(new Event('change'));
              }
            }, 2000);
          }
        }, 1500);
      }

      window.doGTranslate = function (langPair) {
        if (!langPair) return;
        const lang = langPair.split('|')[1];
        const combo = document.querySelector('select.goog-te-combo');
        if (!combo) return;
        combo.value = lang;
        combo.dispatchEvent(new Event('change'));
        if (lang && lang !== 'en') {
          localStorage.setItem('googleTranslateLanguage', lang);
        } else {
          localStorage.removeItem('googleTranslateLanguage');
        }
      };
    </script>
    <script defer src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
