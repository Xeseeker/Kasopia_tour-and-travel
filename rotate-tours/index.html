<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Kasopia Ethiopia Tours — boutique Ethiopian travel company crafting elevated cultural, adventure, and bespoke journeys."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <title>Kasopia Tour and Adventure</title>
  </head>
  <body class="bg-[#f9f9f6]">
    <div id="root"></div>
    <div id="google_translate_element" class="hidden"></div>
    <script>
      // Restore saved language preference
      function restoreLanguage() {
        const savedLang = localStorage.getItem('googleTranslateLanguage');
        if (savedLang && savedLang !== 'en') {
          setTimeout(() => {
            const combo = document.querySelector('select.goog-te-combo');
            if (combo && combo.value !== savedLang) {
              combo.value = savedLang;
              combo.dispatchEvent(new Event('change'));
            }
          }, 500);
        }
      }

      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: 'en',
            includedLanguages: 'am,ar,en,fr,de,iw,it,es',
            layout: google.translate.TranslateElement.InlineLayout.HORIZONTAL,
          },
          'google_translate_element'
        );
        
        // Restore language after initialization
        setTimeout(restoreLanguage, 1000);
        
        // Monitor language changes and save preference
        setTimeout(() => {
          const combo = document.querySelector('select.goog-te-combo');
          if (combo) {
            // Save language when changed
            combo.addEventListener('change', function() {
              if (this.value && this.value !== 'en') {
                localStorage.setItem('googleTranslateLanguage', this.value);
              } else {
                localStorage.removeItem('googleTranslateLanguage');
              }
            });
            
            // Periodically check and restore if changed back to Amharic
            setInterval(() => {
              const savedLang = localStorage.getItem('googleTranslateLanguage');
              if (savedLang && savedLang !== 'en' && combo.value !== savedLang) {
                combo.value = savedLang;
                combo.dispatchEvent(new Event('change'));
              }
            }, 2000);
          }
        }, 1500);
      }

      window.doGTranslate = function (langPair) {
        if (!langPair) return;
        const lang = langPair.split('|')[1];
        const combo = document.querySelector('select.goog-te-combo');
        if (!combo) return;
        combo.value = lang;
        combo.dispatchEvent(new Event('change'));
        // Save the language preference
        if (lang && lang !== 'en') {
          localStorage.setItem('googleTranslateLanguage', lang);
        } else {
          localStorage.removeItem('googleTranslateLanguage');
        }
      };
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
